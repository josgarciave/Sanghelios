<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generar Afiche · Sanghelios</title>
  <style>
    /* ── Tokens ─────────────────────────────────────────────── */
    :root {
      --bg:           #F3F4F6;
      --surface:      #FFFFFF;
      --surface-alt:  #F9FAFB;
      --border:       #E5E7EB;
      --text:         #1F2937;
      --muted:        #6B7280;
      --accent:       #DC2626;
      --accent-h:     #B91C1C;
      --accent-light: #FEE2E2;
      --radius:       12px;
      --shadow:       0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --shadow-lg:    0 8px 32px rgba(0,0,0,.12);
      --font:         'Inter', system-ui, sans-serif;
      --mono:         'JetBrains Mono', 'Fira Code', monospace;
      --transition:   .18s ease;
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ────────────────────────────────────────────── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -.02em;
      color: var(--text);
      text-decoration: none;
    }
    .topbar-brand .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .topbar-back {
      font-size: .8rem;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: .3rem;
      transition: color var(--transition);
    }
    .topbar-back:hover { color: var(--text); }
    .topbar-back svg { width: 14px; height: 14px; }

    /* ── Page layout ────────────────────────────────────────── */
    .page {
      flex: 1;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 0;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 2rem 3rem;
      gap: 2rem;
      align-items: start;
    }

    /* ── Form panel ─────────────────────────────────────────── */
    .form-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .form-header {
      padding: 1.4rem 1.6rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .form-header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }
    .form-header p {
      font-size: .8rem;
      color: var(--muted);
      margin-top: .2rem;
    }

    /* ── Type toggle ────────────────────────────────────────── */
    .toggle-wrap {
      padding: 1.2rem 1.6rem;
      border-bottom: 1px solid var(--border);
    }
    .toggle-label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
    }
    .toggle-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }
    .toggle-btn {
      appearance: none;
      border: none;
      background: transparent;
      border-radius: 6px;
      padding: .55rem .8rem;
      font-size: .82rem;
      font-weight: 600;
      font-family: var(--font);
      color: var(--muted);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
    }
    .toggle-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }
    .toggle-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Fields ─────────────────────────────────────────────── */
    .fields-wrap { padding: 1.2rem 1.6rem; }
    .field-group { display: none; }
    .field-group.active { display: block; }

    .field {
      margin-bottom: 1rem;
    }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: .76rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .35rem;
    }
    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .65rem .85rem;
      font-size: .88rem;
      font-family: var(--font);
      color: var(--text);
      background: var(--surface);
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
      resize: none;
    }
    .field input::placeholder,
    .field textarea::placeholder { color: var(--muted); }
    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(220,38,38,.1);
    }
    .field textarea { min-height: 80px; }

    /* ── Submit ─────────────────────────────────────────────── */
    .form-footer {
      padding: 1rem 1.6rem 1.4rem;
      border-top: 1px solid var(--border);
    }
    .btn-generate {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .88rem;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      transition: background var(--transition), transform .1s;
    }
    .btn-generate:hover { background: var(--accent-h); }
    .btn-generate:active { transform: scale(.985); }
    .btn-generate:disabled {
      background: #E5E7EB;
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
    }
    .btn-generate svg { width: 16px; height: 16px; }

    /* spinner inside button */
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: none;
    }
    .btn-generate.loading .spinner { display: block; }
    .btn-generate.loading .btn-icon { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Preview panel ──────────────────────────────────────── */
    .preview-panel {
      position: sticky;
      top: calc(56px + 2rem);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .preview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .preview-header {
      padding: .9rem 1.3rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .preview-header span {
      font-size: .76rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .badge {
      font-size: .68rem;
      font-weight: 700;
      padding: .2rem .55rem;
      border-radius: 99px;
      background: var(--accent-light);
      color: var(--accent);
      letter-spacing: .04em;
      text-transform: uppercase;
      display: none;
    }
    .badge.visible { display: inline-block; }

    .preview-body {
      padding: 1.4rem;
      min-height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .8rem;
      color: var(--muted);
      text-align: center;
    }
    .empty-state svg {
      width: 40px; height: 40px;
      opacity: .35;
    }
    .empty-state p {
      font-size: .82rem;
      max-width: 200px;
      line-height: 1.5;
    }

    /* Result image */
    .result-img {
      display: none;
      width: 100%;
      border-radius: 6px;
      box-shadow: var(--shadow-lg);
    }
    .result-img.visible { display: block; }

    /* ── Action row ─────────────────────────────────────────── */
    .action-row {
      display: none;
      gap: .6rem;
    }
    .action-row.visible { display: flex; }
    .btn-action {
      flex: 1;
      border-radius: 8px;
      padding: .65rem .9rem;
      font-size: .82rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      text-decoration: none;
      transition: background var(--transition), border-color var(--transition);
    }
    .btn-action svg { width: 14px; height: 14px; flex-shrink: 0; }
    .btn-download {
      background: var(--accent);
      color: #fff;
      border: 1px solid transparent;
    }
    .btn-download:hover { background: var(--accent-h); }
    .btn-reset {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-reset:hover { background: var(--surface-alt); }

    /* ── Error toast ────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #1F2937;
      color: #fff;
      border-radius: 8px;
      padding: .65rem 1.1rem;
      font-size: .82rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s, transform .22s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 860px) {
      .page {
        grid-template-columns: 1fr;
        padding: 1rem;
        gap: 1.2rem;
      }
      .preview-panel { position: static; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── Top bar ──────────────────────────────────────────────── -->
  <header class="topbar">
    <a class="topbar-brand" href="/">
      <span class="dot"></span>
      Sanghelios
    </a>
    <a class="topbar-back" href="/">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M10 3L5 8l5 5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Volver al inicio
    </a>
  </header>

  <!-- ── Page ─────────────────────────────────────────────────── -->
  <main class="page">

    <!-- ── Form panel ─────────────────────────────────────────── -->
    <section class="form-panel">
      <div class="form-header">
        <h1>Generar afiche de donación</h1>
        <p>Completa los campos y descarga el PNG listo para compartir.</p>
      </div>

      <!-- Type toggle -->
      <div class="toggle-wrap">
        <p class="toggle-label">Tipo de afiche</p>
        <div class="toggle-group" role="group" aria-label="Tipo de afiche">
          <button class="toggle-btn active" data-type="event" onclick="switchType('event')">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7">
              <rect x="2" y="3" width="12" height="11" rx="1.5"/>
              <path d="M5 1v3M11 1v3M2 7h12" stroke-linecap="round"/>
            </svg>
            Evento
          </button>
          <button class="toggle-btn" data-type="personal" onclick="switchType('personal')">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7">
              <circle cx="8" cy="5.5" r="2.5"/>
              <path d="M2.5 14c0-3.038 2.462-5 5.5-5s5.5 1.962 5.5 5" stroke-linecap="round"/>
            </svg>
            Personal
          </button>
        </div>
      </div>

      <!-- Fields -->
      <div class="fields-wrap">

        <!-- Event fields -->
        <div class="field-group active" id="fields-event">
          <div class="field">
            <label for="ev-place">Lugar</label>
            <input id="ev-place" type="text" placeholder="Ej. Hospital San Vicente, Sala A" maxlength="80" />
          </div>
          <div class="field">
            <label for="ev-time">Fecha y hora</label>
            <input id="ev-time" type="text" placeholder="Ej. Sábado 5 Jul · 8am – 2pm" maxlength="60" />
          </div>
        </div>

        <!-- Personal fields -->
        <div class="field-group" id="fields-personal">
          <div class="field">
            <label for="pe-name">Nombre del receptor</label>
            <input id="pe-name" type="text" placeholder="Ej. María Gómez" maxlength="60" />
          </div>
          <div class="field">
            <label for="pe-id">Número de identificación</label>
            <input id="pe-id" type="text" placeholder="Ej. 1.234.567.890" maxlength="40" />
          </div>
          <div class="field">
            <label for="pe-place">Lugar de donación</label>
            <input id="pe-place" type="text" placeholder="Ej. Clínica Las Américas" maxlength="80" />
          </div>
          <div class="field">
            <label for="pe-message">Mensaje</label>
            <textarea id="pe-message" placeholder="Ej. Cualquier tipo de sangre es bienvenida. Gracias por ayudarnos." maxlength="220"></textarea>
          </div>
        </div>

      </div><!-- /fields-wrap -->

      <div class="form-footer">
        <button class="btn-generate" id="btn-gen" onclick="generate()">
          <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 2v12M2 8h12" stroke-linecap="round"/>
          </svg>
          <span class="spinner"></span>
          Generar afiche
        </button>
      </div>
    </section>

    <!-- ── Preview panel ───────────────────────────────────────── -->
    <div class="preview-panel">
      <div class="preview-card">
        <div class="preview-header">
          <span>Vista previa</span>
          <span class="badge" id="result-badge">Listo</span>
        </div>
        <div class="preview-body">
          <div class="empty-state" id="empty-state">
            <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.4">
              <rect x="5" y="5" width="30" height="30" rx="4"/>
              <path d="M13 20h14M20 13v14" stroke-linecap="round"/>
            </svg>
            <p>El afiche generado aparecerá aquí.</p>
          </div>
          <img class="result-img" id="result-img" alt="Afiche generado" />
        </div>
      </div>

      <div class="action-row" id="action-row">
        <a class="btn-action btn-download" id="btn-download" href="#" download="afiche-sanghelios.png">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 2v8M5 7l3 3 3-3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12h12" stroke-linecap="round"/>
          </svg>
          Descargar PNG
        </a>
        <button class="btn-action btn-reset" onclick="reset()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 8a5 5 0 1 1 1.5 3.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 11.5V8H6.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Nuevo
        </button>
      </div>
    </div>

  </main>

  <!-- ── Toast ────────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <script>
    let currentType = 'event';

    function switchType(type) {
      currentType = type;
      document.querySelectorAll('.toggle-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.type === type)
      );
      document.querySelectorAll('.field-group').forEach(g =>
        g.classList.toggle('active', g.id === 'fields-' + type)
      );
      reset();
    }

    async function generate() {
      const btn = document.getElementById('btn-gen');

      const body = new FormData();
      body.append('poster_type', currentType);

      if (currentType === 'event') {
        const place = document.getElementById('ev-place').value.trim();
        const time  = document.getElementById('ev-time').value.trim();
        if (!place || !time) { showToast('Completa lugar y fecha antes de generar.'); return; }
        body.append('place', place);
        body.append('time',  time);
      } else {
        const name    = document.getElementById('pe-name').value.trim();
        const idNum   = document.getElementById('pe-id').value.trim();
        const place   = document.getElementById('pe-place').value.trim();
        const message = document.getElementById('pe-message').value.trim();
        if (!name || !idNum || !place) { showToast('Completa nombre, ID y lugar antes de generar.'); return; }
        body.append('name',       name);
        body.append('id_number',  idNum);
        body.append('place',      place);
        body.append('message',    message);
      }

      btn.disabled = true;
      btn.classList.add('loading');

      const res  = await fetch('/generate-image', { method: 'POST', body });
      const data = await res.json();

      btn.disabled = false;
      btn.classList.remove('loading');

      if (!res.ok || data.error) { showToast(data.error ?? 'Error al generar el afiche.'); return; }

      const img     = document.getElementById('result-img');
      const empty   = document.getElementById('empty-state');
      const badge   = document.getElementById('result-badge');
      const actions = document.getElementById('action-row');
      const dl      = document.getElementById('btn-download');

      img.src = data.url + '?t=' + Date.now();
      img.classList.add('visible');
      empty.style.display = 'none';
      badge.classList.add('visible');
      actions.classList.add('visible');
      dl.href     = data.url;
      dl.download = `afiche-${data.type}-sanghelios.png`;
    }

    function reset() {
      const img   = document.getElementById('result-img');
      const empty = document.getElementById('empty-state');
      img.classList.remove('visible');
      img.src = '';
      empty.style.display = '';
      document.getElementById('result-badge').classList.remove('visible');
      document.getElementById('action-row').classList.remove('visible');
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
    }
  </script>
</body>
</html>
